name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # Override by setting a repository variable named GCP_REGION (Settings > Variables).
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v --cov=src/ --cov-report=xml
        env:
          ODOO_URL: https://test.example.com
          ODOO_DB: test_db

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on main branch or when explicitly requested
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-integration')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration -v
        env:
          ODOO_URL: ${{ secrets.STAGING_ODOO_URL }}
          ODOO_DB: ${{ secrets.STAGING_ODOO_DB }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY || secrets.TEST_ODOO_API_KEY }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          TEST_MCP_SERVER_URL: ${{ secrets.TEST_MCP_SERVER_URL }}
          TEST_AUTH_SERVER_URL: ${{ secrets.TEST_AUTH_SERVER_URL }}

  e2e-tests:
    name: E2E MCP HTTP Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    # Run on main branch or when explicitly requested via label
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-integration')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E MCP HTTP tests
        run: pytest tests/e2e/test_mcp_http_e2e.py -v
        env:
          OAUTH_DEV_MODE: "true"
          ODOO_URL: ${{ secrets.STAGING_ODOO_URL }}
          ODOO_DB: ${{ secrets.STAGING_ODOO_DB }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY || secrets.TEST_ODOO_API_KEY }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit safety

      - name: Run Bandit (Python security linter)
        run: bandit -r src/ -ll -ii -x tests/

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit --progress-spinner=off

      - name: Run Safety check (known vulnerabilities)
        run: safety check --full-report

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, security]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: OWNER/odoo-mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push to GCR
        run: |
          docker build --no-cache -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/odoo-mcp-server:${{ github.sha }} -f docker/Dockerfile .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/odoo-mcp-server:${{ github.sha }}

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy odoo-mcp-server \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/odoo-mcp-server:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=5 \
            --concurrency=10 \
            --set-env-vars "ODOO_URL=${{ secrets.STAGING_ODOO_URL }}" \
            --set-env-vars "ODOO_DB=${{ secrets.STAGING_ODOO_DB }}" \
            --set-env-vars "ODOO_USERNAME=${{ secrets.STAGING_ODOO_USERNAME }}" \
            --set-env-vars "OAUTH_PROVIDER=google" \
            --set-env-vars "OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}" \
            --set-env-vars "OAUTH_AUTHORIZATION_SERVER=https://accounts.google.com" \
            --set-env-vars "OAUTH_ISSUER=https://accounts.google.com" \
            --set-env-vars "OAUTH_RESOURCE_IDENTIFIER=${{ secrets.OAUTH_RESOURCE_IDENTIFIER }}" \
            --set-env-vars "OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }}" \
            --set-env-vars "INTERNAL_EMAIL_DOMAIN=${{ secrets.INTERNAL_EMAIL_DOMAIN }}" \
            --set-env-vars "MCP_API_KEY_EMAIL=${{ secrets.MCP_API_KEY_EMAIL }}" \
            --set-secrets "ODOO_API_KEY=odoo-api-key:latest" \
            --set-secrets "OAUTH_CLIENT_SECRET=oauth-client-secret:latest" \
            --set-secrets "MCP_API_KEY=mcp-api-key:latest"

          # Ensure traffic is routed to latest revision
          gcloud run services update-traffic odoo-mcp-server \
            --to-latest \
            --region ${{ env.GCP_REGION }}

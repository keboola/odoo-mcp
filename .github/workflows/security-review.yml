name: Security Code Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  security_review:
    name: AI Security Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Checkout base branch to run trusted security reviewer script
          # This prevents malicious PRs from modifying the reviewer to gain elevated permissions
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests 'anthropic[vertex]'

      - name: Run Security Reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/security_reviewer.py \
            --repo "$REPO" \
            --pr "$PR_NUMBER" \
            --github-token "$GITHUB_TOKEN"
